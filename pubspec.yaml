# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.3.0
  share_plus: ^7.2.1
  image_picker: ^1.0.4
  file_picker: ^10.3.3
  permission_handler: ^12.0.1
  open_file: ^3.3.1
  path_provider: ^2.1.1
  material_design_icons_flutter: ^7.0.7296

  flutter_markdown: ^0.7.3
  flutter_math_fork: ^0.7.2
  highlight: ^0.7.0
  markdown: ^7.1.1

  lottie: ^2.7.0
  table_calendar: ^3.2.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  syncfusion_flutter_pdfviewer: ^31.2.10

  google_sign_in: ^6.2.0
  http: ^1.6.0

  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0
  flutter_quill: ^11.5.0


  pull_to_refresh: ^2.0.0
  webview_flutter: ^4.4.2
  flutter_tts: ^4.2.3
  uuid: ^4.5.2

  url_launcher: ^6.1.11
  # flutter_html: ^3.0.0-beta.2
  flutter_html: ^3.0.0
  # youtube_player_flutter: ^8.1.2
  youtube_player_flutter: 8.0.0
  cached_network_image: ^3.3.0
  # youtube_player_iframe: ^3.1.0+1
  youtube_player_iframe: ^5.2.2
  universal_html: ^2.2.2
  flutter_inappwebview: ^6.0.0
  universal_platform: ^1.0.0+1

  dio: ^5.0.0
  flutter_cache_manager: ^3.3.0
  flutter_markdown_latex: ^0.3.4
  # flutter_markdown_latex: ^0.3.4
  flutter_markdown_plus: ^1.0.7   # or latest
  flutter_markdown_plus_latex: ^1.0.0

  stop_watch_timer: ^3.0.0
  flutter_riverpod: ^2.4.9
  percent_indicator: ^4.2.3

  event_bus: ^2.0.0


dependency_overrides:
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
