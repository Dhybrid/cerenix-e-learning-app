    - assets/images/cerenix2.png
    - assets/images/cerenix3.png
    - assets/images/courseboard.png
    - assets/images/voice1.jpg
    - assets/images/progress.jpg
    - assets/images/progress2.jpg


flutter_native_splash:
  # Background color for the splash screen
  color: "#0077B6"

  # Path to your logo
  image: assets/images/cerenixSpl.png

  # Scale the image to fit
  android_gravity: center
  ios_content_mode: scaleAspectFit

  # Enable for Android and iOS
  android: true
  ios: true



flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_foreground: "assets/images/icon.png"
  adaptive_icon_background: "#0A0F1F"