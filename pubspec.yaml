  flutter_launcher_icons: ^0.13.1

  hive_generator: ^1.1.3
  build_runner: ^2.4.7
  flutter_native_splash: ^2.2.10
  

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/icon.png
    - assets/images/robot.gif
    - assets/images/pastQuestions.png
    - assets/images/activate.png
    - assets/images/scan.png
    - assets/images/aiBoard.png
    - assets/images/course.png
    - assets/images/CGPA.png
    - assets/images/waveAI.gif
    - assets/images/cerenixSplash.png
    - assets/images/advertboard.jpeg
    - assets/images/profilePicture.jpg
    - assets/images/courses.jpeg
    - assets/images/cerenixiconlittleone.png
    - assets/lottie/Video.json
    - assets/lottie/voiceone.json
    - assets/lottie/activeVoice.json
    - assets/images/cerenixSpl.png
